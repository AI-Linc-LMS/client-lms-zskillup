# Netlify edge proxy for the backend API.
#
# The site is HTTPS but the backend ALB is plain HTTP, so the browser can't call
# it directly (mixed content). These rewrites serve the API SAME-ORIGIN and are
# processed at Netlify's edge BEFORE the Next.js serverless function — so API
# calls skip the function cold start that was making the question bank / courses
# pages slow to load. (next.config.ts keeps an equivalent rewrite as a fallback
# for any path the edge layer doesn't capture.)
#
# Keep the host below in sync with the backend ALB DNS.
# Backend runs in the zskillup AWS account (511974511619); ALB below is its LB.

[[redirects]]
  from = "/api/v1/*"
  to = "http://zskillup-load-balancer-122235018.ap-south-1.elb.amazonaws.com/api/v1/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/ready"
  to = "http://zskillup-load-balancer-122235018.ap-south-1.elb.amazonaws.com/ready"
  status = 200
  force = true

[[redirects]]
  from = "/health"
  to = "http://zskillup-load-balancer-122235018.ap-south-1.elb.amazonaws.com/health"
  status = 200
  force = true

# Canonical-domain redirect. The site must only ever be used on prephasz.com:
#  - Razorpay blocks live payments whose checkout runs on an UNREGISTERED domain
#    ("Business – Website Mismatch"). Only prephasz.com is registered, so a
#    payment attempted from the raw Netlify subdomain fails.
#  - Session cookies (the `role` middleware hint + the HttpOnly refresh cookie)
#    are host-scoped, so mixing the two domains logs the user out (/practice →
#    /login bounce).
# Force every request to the default Netlify subdomain over to prephasz.com,
# preserving the path + query. Listed AFTER the /api proxies so API calls are
# still served same-origin; deploy previews (deploy-preview-*--…) don't match.
[[redirects]]
  from = "https://zskilluplms.netlify.app/*"
  to = "https://prephasz.com/:splat"
  status = 301
  force = true
